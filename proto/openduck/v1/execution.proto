syntax = "proto3";

package openduck.v1;

// OpenDuck execution service (v1). Messages will evolve; bump package or use versioned service names.

service ExecutionService {
  // Execute a remote plan fragment; stream result batches (Arrow IPC bytes).
  rpc ExecuteFragment(ExecuteFragmentRequest) returns (stream ExecuteFragmentChunk);
  rpc CancelExecution(CancelRequest) returns (CancelReply);
  // Workers register capabilities so the gateway can route by database affinity.
  rpc RegisterWorker(WorkerRegistration) returns (RegisterWorkerReply);
  // Workers send periodic heartbeats to keep their registration alive.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatReply);
}

message ExecuteFragmentRequest {
  // Serialized plan IR or opaque DuckDB fragment (versioned by consumer).
  // M2: UTF-8 SQL string. M3: structured IR with per-operator placement (local / remote).
  bytes plan = 1;
  string database = 2;
  // Snapshot / consistency token for differential storage reads.
  optional string snapshot_id = 3;
  // Bearer-style auth; clients should prefer OPENDUCK_TOKEN via channel creds in production.
  string access_token = 4;
  // Client or gateway assigned execution id for cancel routing.
  string execution_id = 5;
  // Preferred compute context for routing (e.g. "region=us-east-1").
  // If set, the gateway prefers workers matching this context.
  string compute_context = 6;
}

message ExecuteFragmentChunk {
  oneof payload {
    ArrowIpcBatch arrow_batch = 1;
    string error = 2;
    bool finished = 3;
  }
}

message ArrowIpcBatch {
  bytes ipc_stream_payload = 1;
}

message CancelRequest {
  string execution_id = 1;
  string access_token = 2;
}

message CancelReply {
  bool acknowledged = 1;
}

// ── Worker self-description & affinity routing ──────────────────────────

// A worker describes itself to the gateway on startup.
message WorkerRegistration {
  // Unique worker id (UUID recommended).
  string worker_id = 1;
  // gRPC endpoint the gateway should use to reach this worker.
  string endpoint = 2;
  // Databases this worker can serve (empty = any).
  repeated string databases = 3;
  // Opaque compute context (e.g. "region=us-east-1,instance=i-abc123").
  // Workers with the same compute_context are interchangeable for routing.
  string compute_context = 4;
  // Max concurrent executions this worker accepts (0 = unlimited).
  uint32 max_concurrency = 5;
  // Tables this worker is authoritative for (used by the planner for
  // remote placement and co-location decisions). Empty = discover at query time.
  repeated string tables = 6;
  // Bearer-style auth token (validated against OPENDUCK_TOKEN).
  string access_token = 7;
}

message RegisterWorkerReply {
  bool accepted = 1;
}

message HeartbeatRequest {
  string worker_id = 1;
  // Bearer-style auth token (validated against OPENDUCK_TOKEN).
  string access_token = 2;
}

message HeartbeatReply {
  bool acknowledged = 1;
}
