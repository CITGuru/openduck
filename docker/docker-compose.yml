services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openduck
      POSTGRES_PASSWORD: openduck
      POSTGRES_DB: openduck_meta
    # Host 5433 avoids clashing with a local Postgres (or other compose) on 5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openduck -d openduck_meta"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_minio_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata: {}
  miniodata: {}
